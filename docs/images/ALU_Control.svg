<path d="M 136 265 L 238.0 265.0 Q 250 265 250.0 267.5 L 250.0 267.5 Q 250 270 262.0 270.0 L 280 270.0 " fill="none" stroke="#38BDF8" stroke-width="3.0" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#ar-data)"/>
<path d="M 154 325 L 238.0 325.0 Q 250 325 250.0 313.0 L 250.0 282.0 Q 250 270 262.0 270.0 L 280 270.0 " fill="none" stroke="#38BDF8" stroke-width="3.0" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#ar-data)"/>
<rect x="560" y="255" width="94" height="30" rx="15" fill="#3B1D0B" stroke="#F97316" stroke-width="1.5"/>
<text x="607.0" y="274.5" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12.5" font-weight="600" fill="#FFEDD5">alu_ctrl</text>
<rect x="660.0" y="261" width="20" height="18" rx="9" fill="#111827" stroke="#38BDF8" stroke-width="1" opacity="0.95"/>
<text x="670" y="274" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="10.5" fill="#38BDF8">4</text>
<path d="M 460 270.0 L 560 270 " fill="none" stroke="#38BDF8" stroke-width="3.0" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#ar-data)"/>
<rect x="760" y="150" width="300" height="300" rx="12" fill="#111827" stroke="#64748B" stroke-width="1.5" filter="url(#soft)"/>
<text x="776" y="174" font-family="Inter, 'Helvetica Neue', 'Segoe UI', system-ui, Arial, sans-serif" font-size="13" font-weight="700" fill="#D8DDF5">alu_op decode table</text>
<text x="776" y="196" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12.5" fill="#D8DDF5">alu_op=00  → ADD   (addr calc)</text>
<text x="776" y="215" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12.5" fill="#D8DDF5">alu_op=01  → SUB   (branches)</text>
<text x="776" y="234" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12.5" fill="#D8DDF5">alu_op=10  → decode funct3/7:</text>
<text x="776" y="253" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12.5" fill="#D8DDF5">   000 → ADD/SUB    100 → XOR</text>
<text x="776" y="272" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12.5" fill="#D8DDF5">   001 → SLL        101 → SRL/SRA</text>
<text x="776" y="291" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12.5" fill="#D8DDF5">   010 → SLT        110 → OR</text>
<text x="776" y="310" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12.5" fill="#D8DDF5">   011 → SLTU       111 → AND</text>
<text x="776" y="329" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12.5" fill="#D8DDF5">alu_op=11  → pass B (LUI)</text>
</svg>