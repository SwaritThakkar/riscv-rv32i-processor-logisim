<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 560" width="1120" height="560" font-family="Inter, 'Helvetica Neue', 'Segoe UI', system-ui, Arial, sans-serif">
<defs>
<filter id="soft" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.45"/></filter>
<marker id="ar-data" markerWidth="10" markerHeight="10" refX="7.5" refY="4" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,4 L0,8 Z" fill="#7C8BA1"/></marker>
<marker id="ar-ctrl" markerWidth="10" markerHeight="10" refX="7.5" refY="4" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,4 L0,8 Z" fill="#F97316"/></marker>
<pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0 L0 0 0 40" fill="none" stroke="#1B2740" stroke-width="1"/></pattern>
<linearGradient id="bgg" x1="0" y1="0" x2="0.6" y2="1"><stop offset="0" stop-color="#070A12"/><stop offset="1" stop-color="#0E1626"/></linearGradient>
</defs>
<rect width="1120" height="560" fill="url(#bgg)"/>
<rect width="1120" height="560" fill="url(#grid)" opacity="0.5"/>
<rect x="40" y="34" width="34" height="6" rx="3" fill="#38BDF8"/>
<text x="40" y="74" font-family="Inter, 'Helvetica Neue', 'Segoe UI', system-ui, Arial, sans-serif" font-size="30" font-weight="750" fill="#F8FAFC">ALU Control</text>
<text x="40" y="100" font-family="Inter, 'Helvetica Neue', 'Segoe UI', system-ui, Arial, sans-serif" font-size="14.5" fill="#9CA3AF">Decodes the exact ALU operation from alu_op, funct3 and funct7</text>
