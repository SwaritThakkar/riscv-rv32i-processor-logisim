<rect x="60" y="250" width="76" height="30" rx="15" fill="#123524" stroke="#6EE7B7" stroke-width="1.5"/>
<text x="98.0" y="269.5" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12.5" font-weight="600" fill="#DCFCE7">funct3</text>
<rect x="142.0" y="256" width="20" height="18" rx="9" fill="#111827" stroke="#38BDF8" stroke-width="1" opacity="0.95"/>
<text x="152" y="269" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="10.5" fill="#38BDF8">3</text>
<rect x="60" y="310" width="94" height="30" rx="15" fill="#123524" stroke="#6EE7B7" stroke-width="1.5"/>
<text x="107.0" y="329.5" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12.5" font-weight="600" fill="#DCFCE7">funct7_5</text>
<rect x="160.0" y="316" width="20" height="18" rx="9" fill="#111827" stroke="#38BDF8" stroke-width="1" opacity="0.95"/>
<text x="170" y="329" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="10.5" fill="#38BDF8">1</text>
<rect x="280" y="215" width="180" height="110" rx="14" fill="#3B2F0B" stroke="#FFD34D" stroke-width="1.6" filter="url(#soft)"/>
<rect x="280" y="215" width="5" height="110" rx="2.5" fill="#FFD34D"/>
<text x="370.0" y="266.0" text-anchor="middle" font-family="Inter, 'Helvetica Neue', 'Segoe UI', system-ui, Arial, sans-serif" font-size="16" font-weight="650" fill="#FEF3C7">ROM</text>
<text x="370.0" y="286.0" text-anchor="middle" font-family="Inter, 'Helvetica Neue', 'Segoe UI', system-ui, Arial, sans-serif" font-size="11.5" fill="#D9C68A">6-bit addr → 4-bit op</text>
