<text x="776" y="189" font-family="Inter, 'Helvetica Neue', 'Segoe UI', system-ui, Arial, sans-serif" font-size="13" font-weight="700" fill="#D8DDF5">branch conditions</text>
<text x="776" y="211" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12.5" fill="#D8DDF5">beq   a == b</text>
<text x="776" y="230" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12.5" fill="#D8DDF5">bne   a != b</text>
<text x="776" y="249" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12.5" fill="#D8DDF5">blt   a &lt;  b   (signed)</text>
<text x="776" y="268" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12.5" fill="#D8DDF5">bge   a &gt;= b   (signed)</text>
<text x="776" y="287" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12.5" fill="#D8DDF5">bltu  a &lt;  b   (unsigned)</text>
<text x="776" y="306" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12.5" fill="#D8DDF5">bgeu  a &gt;= b   (unsigned)</text>
